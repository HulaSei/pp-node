name: Sync upstream
on:
  schedule:
    - cron: '6 5 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.UPSTREAMFORK }} 
      - name: Sync upstream
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/perfect-panel/ppanel-node.git
          git fetch upstream
          git checkout master
          git merge upstream/master
          git push
